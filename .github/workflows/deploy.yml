name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          cat <<EOF > package.json
          {
            "name": "mtsubs",
            "type": "module",
            "dependencies": {
              "@astrojs/tailwind": "^5.1.0",
              "astro": "^4.5.0",
              "tailwindcss": "^3.4.1"
            }
          }
          EOF

          cat <<EOF > tailwind.config.mjs
          /** @type {import('tailwindcss').Config} */
          export default {
            content: ['./src/**/*.{astro,html,js,jsx,md,mdx,svelte,ts,tsx,vue}'],
            theme: {
              extend: {},
            },
            plugins: [],
          }
          EOF

          cat <<EOF > astro.config.mjs
          import { defineConfig } from 'astro/config';
          import tailwind from '@astrojs/tailwind';
          export default defineConfig({
            output: 'static',
            outDir: 'dist',
            base: './',
            integrations: [tailwind({
              applyBaseStyles: true,
              nesting: true
            })],
            i18n: {
              defaultLocale: 'zh-hans',
              locales: ['zh-hans', 'en'],
              routing: {
                prefixDefaultLocale: true,
                strategy: 'prefix'
              }
            }
          });
          EOF

          mkdir -p src/pages/zh-hans
          mkdir -p src/layouts

          cat <<EOF > src/layouts/Layout.astro
          ---
          const { title } = Astro.props;
          ---
          <!DOCTYPE html>
          <html lang="zh-hans">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width" />
              <title>{title}</title>
            </head>
            <body class="bg-black text-white m-0">
              <slot />
            </body>
          </html>
          EOF

          cat <<EOF > src/pages/index.astro
          ---
          ---
          <meta http-equiv="refresh" content="0;url=./zh-hans/" />
          EOF

          touch .nojekyll

      - name: Install dependencies
        run: npm install

      - name: Build with Astro
        run: npx astro build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4