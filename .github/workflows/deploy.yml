name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup (Auto-Fix)
        run: |
          # 1. 如果没有 package.json，自动创建一个
          if [ ! -f "package.json" ]; then
            echo '{"name":"mtsubs","type":"module","dependencies":{"@astrojs/tailwind":"^5.1.0","astro":"^4.5.0","tailwindcss":"^3.4.1"}}' > package.json
            echo "Created missing package.json"
          fi

          # 2. 如果没有 astro.config.mjs，自动创建一个
          if [ ! -f "astro.config.mjs" ]; then
            echo 'import {defineConfig} from "astro/config";import tailwind from "@astrojs/tailwind";export default defineConfig({integrations:[tailwind()],i18n:{defaultLocale:"zh-hans",locales:["zh-hans","en"],routing:{prefixDefaultLocale:true,fallbackType:"none"}}});' > astro.config.mjs
            echo "Created missing astro.config.mjs"
          fi

          # 3. 如果没有 .nojekyll，创建一个以禁用 Jekyll
          touch .nojekyll

      - name: Install dependencies
        run: npm install

      - name: Build with Astro
        run: npx astro build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4